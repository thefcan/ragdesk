name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ragdesk
          POSTGRES_PASSWORD: ragdesk
          POSTGRES_DB: ragdesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ragdesk -d ragdesk_test"
          --health-interval 5s --health-timeout 3s --health-retries 12
    defaults:
      run:
        working-directory: api
    env:
      DATABASE_URL: postgres://ragdesk:ragdesk@localhost:5432/ragdesk_test?sslmode=disable
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: api
      - name: build
        run: go build ./...
      - name: test (race detector, integration)
        run: go test -race -p 1 ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  ai:
    name: ai (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: ruff lint
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .
      - name: pytest
        run: pytest -q

  web:
    name: web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: build api image
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: false
      - name: build ai image
        uses: docker/build-push-action@v7
        with:
          context: ./ai
          push: false

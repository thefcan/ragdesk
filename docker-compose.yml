name: ragdesk

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ragdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragdesk}
      POSTGRES_DB: ${POSTGRES_DB:-ragdesk}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ragdesk} -d ${POSTGRES_DB:-ragdesk}"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build: ./api
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgres://ragdesk:ragdesk@postgres:5432/ragdesk?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai:8000
      RAGDESK_ENV: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/ragdesk-api", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  ai:
    build: ./ai
    restart: unless-stopped
    environment:
      PORT: 8000
      DATABASE_URL: postgres://ragdesk:ragdesk@postgres:5432/ragdesk
      # Ollama runs on the host (free, local). host-gateway bridges into it.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      RAGDESK_ENV: docker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').getcode()==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
